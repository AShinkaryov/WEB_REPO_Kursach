<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AMI — Вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">

  <div class="auth-container">
    <!-- Logo -->
    <div class="auth-logo">
      <img src="img/logo-sidebar.png" alt="AMI" />
    </div>

    <!-- Login Form -->
    <div class="auth-form-wrapper">
      <h1 class="auth-title">Вход</h1>
      
      <form id="login-form" class="auth-form">
        <div class="form-group">
          <input type="email" id="login-email" class="form-input" placeholder="E-mail*" required />
        </div>
        
        <div class="form-group">
          <input type="password" id="login-password" class="form-input" placeholder="Пароль*" required />
        </div>

        <div class="form-group">
          <select id="login-role" class="form-select">
            <option value="user">Покупатель</option>
            <option value="admin">Администратор</option>
          </select>
        </div>

        <button type="submit" class="auth-btn">Войти</button>
      </form>

      <p class="auth-link">
        Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
      </p>

      <p class="auth-link">
        <a href="catalog.html">Продолжить как гость</a>
      </p>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
