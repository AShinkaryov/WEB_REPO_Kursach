<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AMI — Вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/theme.css">
  <style>
    /* 🔥 Переключатель языков на странице входа */
    .lang-switcher {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 8px;
      z-index: 100;
    }
    .lang-switcher span {
      cursor: pointer;
      padding: 6px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      font-family: "Manrope", sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #666;
      transition: all 0.2s;
    }
    .lang-switcher span:hover {
      border-color: #E8593A;
      color: #E8593A;
    }
    .lang-switcher span.active {
      background: #E8593A;
      color: #fff;
      border-color: #E8593A;
    }
  </style>
</head>
<body class="auth-page">

  <!-- 🔥 ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКОВ -->
  <div class="lang-switcher">
    <span onclick="changeLang('en')" id="lang-en">En</span>
    <span onclick="changeLang('ru')" id="lang-ru" class="active">Ru</span>
    <span onclick="changeLang('be')" id="lang-be">Be</span>
  </div>

  <div class="auth-container">
    <!-- Logo -->
    <div class="auth-logo">
      <img src="img/logo-sidebar.png" alt="AMI" />
    </div>

    <!-- Login Form -->
    <div class="auth-form-wrapper">
      <h1 class="auth-title" data-i18n="auth.login_title">Вход</h1>
      
      <form id="login-form" class="auth-form">
        <div class="form-group">
          <input type="email" id="login-email" class="form-input" placeholder="E-mail*" required data-i18n-placeholder="auth.email_placeholder" />
        </div>
        
        <div class="form-group">
          <input type="password" id="login-password" class="form-input" placeholder="Пароль*" required data-i18n-placeholder="auth.password_placeholder" />
        </div>

        <div class="form-group">
          <select id="login-role" class="form-select">
            <option value="user" data-i18n="auth.role_user">Покупатель</option>
            <option value="admin" data-i18n="auth.role_admin">Администратор</option>
          </select>
        </div>

        <button type="submit" class="auth-btn" data-i18n="auth.login_btn">Войти</button>
      </form>

      <p class="auth-link">
        <span data-i18n="auth.no_account">Нет аккаунта?</span> <a href="register.html" data-i18n="auth.register_link">Зарегистрироваться</a>
      </p>

      <p class="auth-link">
         <a href="Catalog.html" onclick="loginAsGuest(); return false;" data-i18n="auth.continue_as_guest">Продолжить как гость</a>
      </p>
    </div>
  </div>
 
  <script src="js/auth.js"></script>
  <!-- 🔥 ПОДКЛЮЧЕНИЕ МОДУЛЯ ИНТЕРНАЦИОНАЛИЗАЦИИ -->
  <script src="js/i18n.js"></script>
  
  <!-- 🔥 СКРИПТ ДЛЯ ПЕРЕКЛЮЧЕНИЯ ЯЗЫКОВ -->
  <script>
    // Функция переключения языка (глобальная)
    function changeLang(lang) {
      console.log('🔄 Changing language to:', lang);
      
      // Сохраняем язык
      if (typeof I18n !== 'undefined' && typeof I18n.setLang === 'function') {
        I18n.setLang(lang);
        updateLangButtons(lang);
      } else {
        // Fallback если I18n ещё не загружен
        localStorage.setItem('ami-lang', lang);
        location.reload();
      }
    }
    
    // Обновление кнопок
    function updateLangButtons(activeLang) {
      ['en', 'ru', 'be'].forEach(lang => {
        const btn = document.getElementById('lang-' + lang);
        if (btn) {
          if (lang === activeLang) {
            btn.classList.add('active');
          } else {
            btn.classList.remove('active');
          }
        }
      });
    }
    
    // При загрузке страницы устанавливаем активную кнопку
    document.addEventListener('DOMContentLoaded', () => {
      const currentLang = localStorage.getItem('ami-lang') || 'ru';
      updateLangButtons(currentLang);
      
      // Если I18n загружен, используем его
      if (typeof I18n !== 'undefined') {
        console.log('✅ I18n loaded, current lang:', I18n.getLang());
      }
    });
  </script>
  <script src="js/theme.js"></script>
</body>
</html>
