<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AMI — Регистрация</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">

  <div class="auth-container">
    <!-- Logo -->
    <div class="auth-logo">
      <img src="img/logo-sidebar.png" alt="AMI" />
    </div>

    <!-- Register Form -->
    <div class="auth-form-wrapper">
      <h1 class="auth-title">Регистрация</h1>
      
      <form id="register-form" class="auth-form" autocomplete="off">
  <div class="form-group">
    <input type="text" id="register-name" class="form-input" placeholder="Имя и фамилия*" required autocomplete="name" />
  </div>
  
  <div class="form-group">
    <input type="email" id="register-email" class="form-input" placeholder="E-mail*" required autocomplete="new-email" />
  </div>
  
  <div class="form-group">
    <input type="tel" id="register-phone" class="form-input" placeholder="Телефон*" required autocomplete="tel" />
  </div>

  <div class="form-group">
    <input type="password" id="register-password" class="form-input" placeholder="Пароль*" required minlength="6" autocomplete="new-password" />
  </div>

  <div class="form-group">
    <input type="password" id="register-confirm" class="form-input" placeholder="Подтвердите пароль*" required autocomplete="new-password" />
  </div>

  <div class="form-group">
    <select id="register-role" class="form-select">
      <option value="user">Покупатель</option>
    </select>
  </div>

  <button type="submit" class="auth-btn">Зарегистрироваться</button>
</form>

      <p class="auth-link">
        Уже есть аккаунт? <a href="login.html">Войти</a>
      </p>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
