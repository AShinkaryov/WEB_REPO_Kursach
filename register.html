<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AMI — Регистрация</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/accessibility.css">
  <link rel="stylesheet" href="css/preloader.css">
  <style>
    .lang-switcher {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 8px;
      z-index: 100;
    }
    .lang-switcher span {
      cursor: pointer;
      padding: 6px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      font-family: "Manrope", sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #666;
      transition: all 0.2s;
    }
    .lang-switcher span:hover { border-color: #E8593A; color: #E8593A; }
    .lang-switcher span.active { background: #E8593A; color: #fff; border-color: #E8593A; }
    
    /* 🔥 НОВЫЕ СТИЛИ ДЛЯ ВАЛИДАЦИИ */
    .form-group {
      position: relative;
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #423F3E;
      margin-bottom: 6px;
    }
    
    .form-group label .required {
      color: #E8593A;
      margin-left: 2px;
    }
    
    .field-error {
      display: block;
      color: #E8593A;
      font-size: 12px;
      margin-top: 4px;
      min-height: 16px;
      font-family: "Manrope", sans-serif;
    }
    
    .form-input.invalid,
    .form-select.invalid {
      border-color: #E8593A !important;
      background: #fff5f2;
    }
    
    .form-input.valid,
    .form-select.valid {
      border-color: #27ae60 !important;
    }
    
    /* Индикатор силы пароля */
    .password-strength {
      margin-top: 6px;
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      overflow: hidden;
    }
    
    .password-strength-bar {
      height: 100%;
      width: 0;
      transition: all 0.3s ease;
      border-radius: 3px;
    }
    
    .password-strength-bar.weak { width: 25%; background: #e74c3c; }
    .password-strength-bar.medium { width: 50%; background: #f39c12; }
    .password-strength-bar.good { width: 75%; background: #3498db; }
    .password-strength-bar.strong { width: 100%; background: #27ae60; }
    
    .password-requirements {
      font-size: 11px;
      color: #7B7B7B;
      margin-top: 6px;
      line-height: 1.6;
    }
    
    .password-requirements .req {
      display: inline-block;
      margin-right: 8px;
    }
    
    .password-requirements .req.met {
      color: #27ae60;
    }
    
    .password-requirements .req.met::before {
      content: "✓ ";
    }
    
    .password-requirements .req.unmet::before {
      content: "✗ ";
      color: #E8593A;
    }
    
    /* Выбор способа пароля */
    .password-mode-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    
    .password-mode-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-family: "Manrope", sans-serif;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .password-mode-btn.active {
      border-color: #E8593A;
      background: #fff5f2;
      color: #E8593A;
    }
    
    /* Никнейм */
    .nickname-container {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    
    .nickname-container input {
      flex: 1;
    }
    
    .nickname-generate-btn {
      padding: 10px 14px;
      background: #3498db;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
    }
    
    .nickname-generate-btn:hover {
      background: #2980b9;
    }
    
    .nickname-attempts {
      font-size: 11px;
      color: #7B7B7B;
      margin-top: 4px;
    }
    
    /* Чекбокс соглашения */
    .agreement-checkbox {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 15px 0;
      font-size: 13px;
      color: #423F3E;
    }
    
    .agreement-checkbox input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      cursor: pointer;
      accent-color: #E8593A;
    }
    
    .agreement-checkbox a {
      color: #E8593A;
      text-decoration: underline;
    }
    
    /* Кнопка регистрации */
    .auth-btn:disabled {
      background: #ccc !important;
      cursor: not-allowed !important;
      opacity: 0.6;
    }
    
    .auth-btn:disabled:hover {
      transform: none !important;
      box-shadow: none !important;
    }
    
    /* Автогенерированный пароль */
    .auto-password-display {
      background: #f0f8ff;
      border: 2px dashed #3498db;
      padding: 12px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 16px;
      text-align: center;
      color: #2c3e50;
      margin: 10px 0;
      word-break: break-all;
    }
    
    .copy-password-btn {
      padding: 8px 16px;
      background: #3498db;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      margin-top: 8px;
    }
  </style>
</head>
<body class="auth-page">

  <!-- ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКОВ -->
  <div class="lang-switcher">
    <span onclick="changeLang('en')" id="lang-en">En</span>
    <span onclick="changeLang('ru')" id="lang-ru" class="active">Ru</span>
    <span onclick="changeLang('be')" id="lang-be">Be</span>
  </div>

  <div class="auth-container">
    <div class="auth-logo">
      <img src="img/logo-sidebar.png" alt="AMI" />
    </div>

    <div class="auth-form-wrapper">
      <h1 class="auth-title" data-i18n="auth.register_title">Регистрация</h1>
      
      <form id="register-form" class="auth-form" autocomplete="off" novalidate>
        
        <!-- ФИО -->
        <div class="form-group">
          <label data-i18n="auth.label_fullname">ФИО <span class="required">*</span></label>
          <input type="text" id="register-fullname" class="form-input" 
                 placeholder="Иванов Иван Иванович" required
                 data-i18n-placeholder="auth.placeholder_fullname" />
          <span class="field-error" id="error-fullname"></span>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label>Email <span class="required">*</span></label>
          <input type="email" id="register-email" class="form-input" 
                 placeholder="example@mail.ru" required
                 data-i18n-placeholder="auth.placeholder_email" />
          <span class="field-error" id="error-email"></span>
        </div>
        
        <!-- Телефон РБ -->
        <div class="form-group">
          <label data-i18n="auth.label_phone">Телефон <span class="required">*</span></label>
          <input type="tel" id="register-phone" class="form-input" 
                 placeholder="+375 (XX) XXX-XX-XX" required
                 data-i18n-placeholder="auth.placeholder_phone" />
          <span class="field-error" id="error-phone"></span>
        </div>

        <!-- Дата рождения -->
        <div class="form-group">
          <label data-i18n="auth.label_birthdate">Дата рождения <span class="required">*</span></label>
          <input type="date" id="register-birthdate" class="form-input" required />
          <span class="field-error" id="error-birthdate"></span>
        </div>

        <!-- Никнейм -->
        <div class="form-group">
          <label data-i18n="auth.label_nickname">Никнейм <span class="required">*</span></label>
          <div class="nickname-container">
            <input type="text" id="register-nickname" class="form-input" 
                   placeholder="Ваш никнейм" required
                   data-i18n-placeholder="auth.placeholder_nickname" />
            <button type="button" class="nickname-generate-btn" id="generate-nickname-btn" title="Сгенерировать">
              🎲
            </button>
          </div>
          <div class="nickname-attempts" id="nickname-attempts"></div>
          <span class="field-error" id="error-nickname"></span>
        </div>

        <!-- Выбор способа пароля -->
        <div class="form-group">
          <label data-i18n="auth.label_password_mode">Способ задания пароля <span class="required">*</span></label>
          <div class="password-mode-selector">
            <button type="button" class="password-mode-btn active" data-mode="manual" data-i18n="auth.password_manual">
              🔑 Ввести самостоятельно
            </button>
            <button type="button" class="password-mode-btn" data-mode="auto" data-i18n="auth.password_auto">
              🤖 Сгенерировать автоматически
            </button>
          </div>
        </div>

        <!-- Ручной ввод пароля -->
        <div id="manual-password-section">
          <div class="form-group">
            <label data-i18n="auth.label_password">Пароль <span class="required">*</span></label>
            <input type="password" id="register-password" class="form-input" 
                   placeholder="Минимум 8 символов" required
                   data-i18n-placeholder="auth.placeholder_password" />
            <div class="password-strength">
              <div class="password-strength-bar" id="password-strength-bar"></div>
            </div>
            <div class="password-requirements" id="password-requirements">
              <span class="req" id="req-length">8-20 символов</span>
              <span class="req" id="req-upper">Заглавная</span>
              <span class="req" id="req-lower">Строчная</span>
              <span class="req" id="req-digit">Цифра</span>
              <span class="req" id="req-special">Спецсимвол</span>
            </div>
            <span class="field-error" id="error-password"></span>
          </div>

          <div class="form-group">
            <label data-i18n="auth.label_confirm_password">Подтвердите пароль <span class="required">*</span></label>
            <input type="password" id="register-confirm" class="form-input" 
                   placeholder="Повторите пароль" required
                   data-i18n-placeholder="auth.placeholder_confirm_password"
                   onpaste="return false;" />
            <span class="field-error" id="error-confirm"></span>
          </div>
        </div>

        <!-- Автогенерация пароля -->
        <div id="auto-password-section" style="display:none;">
          <div class="auto-password-display" id="auto-password-display"></div>
          <button type="button" class="copy-password-btn" onclick="copyAutoPassword()">
            📋 Скопировать пароль
          </button>
          <input type="hidden" id="auto-password-value" />
        </div>

        <!-- Роль -->
        <div class="form-group">
          <label data-i18n="auth.label_role">Роль <span class="required">*</span></label>
          <select id="register-role" class="form-select">
            <option value="user" data-i18n="auth.role_user">Покупатель</option>
          </select>
        </div>

        <!-- Соглашение -->
        <div class="agreement-checkbox">
          <input type="checkbox" id="register-agreement" required />
          <label for="register-agreement">
            <span data-i18n="auth.agreement_text">Я прочитал и согласен с</span>
            <a href="#" onclick="showAgreement(); return false;" data-i18n="auth.agreement_link">Соглашением пользователя</a>
            <span class="required">*</span>
          </label>
        </div>
        <span class="field-error" id="error-agreement"></span>

        <button type="submit" class="auth-btn" id="register-submit-btn" disabled data-i18n="auth.register_btn">
          Зарегистрироваться
        </button>
      </form>

      <p class="auth-link">
        <span data-i18n="auth.have_account">Уже есть аккаунт?</span> 
        <a href="login.html" data-i18n="auth.login_link">Войти</a>
      </p>
    </div>
  </div>

  <script src="data/top-passwords.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/register-validation.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/accessibility.js"></script>
  
  <script>
    function changeLang(lang) {
      if (typeof I18n !== 'undefined' && typeof I18n.setLang === 'function') {
        I18n.setLang(lang);
        updateLangButtons(lang);
      } else {
        localStorage.setItem('ami-lang', lang);
        location.reload();
      }
    }
    
    function updateLangButtons(activeLang) {
      ['en', 'ru', 'be'].forEach(lang => {
        const btn = document.getElementById('lang-' + lang);
        if (btn) {
          btn.classList.toggle('active', lang === activeLang);
        }
      });
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      const currentLang = localStorage.getItem('ami-lang') || 'ru';
      updateLangButtons(currentLang);
    });
  </script>
  <script src="js/preloader.js"></script>
</body>
</html>
